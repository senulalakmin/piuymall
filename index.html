<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerPoint Style Mixed Presentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styling */
        body {
            margin: 0;
            padding: 0;
            /* Premium Dark Abstract Background */
            background: radial-gradient(circle at 50% 50%, #1a153a 0%, #0a0813 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* Presentation Container */
        .presentation-container {
            position: relative;
            width: 85%;
            max-width: 1050px;
            height: 78vh;
            /* Deep smooth shadow for a 3D pop effect */
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 0 0 50px rgba(108, 92, 231, 0.1);
            border-radius: 20px;
            overflow: hidden;
            background-color: #050508;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Fullscreen Mode Container */
        .presentation-container:fullscreen {
            width: 100vw;
            max-width: 100vw;
            height: 100vh;
            border-radius: 0;
            border: none;
        }

        /* Slide Wrapper turned into a relative container for absolute layering */
        .slide-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Premium Animation Base for both Images and Videos */
        .slide-media {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background-color: #050508;
            opacity: 0;
            transform: scale(1.06); /* Starts slightly zoomed out */
            transition: opacity 0.8s ease-in-out, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1;
            pointer-events: none;
        }

        video.slide-media {
            pointer-events: none; 
        }

        /* Active Slide Animation State */
        .slide-media.active {
            opacity: 1;
            transform: scale(1); /* Smoothly zooms into focus */
            z-index: 2;
            pointer-events: auto;
        }

        /* Glassmorphism Controls Base */
        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            z-index: 10;
        }

        /* Fullscreen Button Styling */
        .fullscreen-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* Toggle Info Button Styling */
        .toggle-btn {
            position: absolute;
            top: 25px;
            right: 185px; 
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* Slide Counter */
        .slide-counter {
            position: absolute;
            top: 25px;
            left: 25px;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Navigation Arrows */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
        }

        /* Show arrows on container hover */
        .presentation-container:hover .nav-arrow {
            opacity: 1;
        }

        .prev-arrow { left: 25px; }
        .next-arrow { right: 25px; }

        .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-50%) scale(1.1);
        }

        /* Premium Top Progress Bar */
        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.05);
            z-index: 11;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            box-shadow: 0 0 10px #6c5ce7;
            transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Hint Text & Timer Container */
        .instruction-tag {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 13px;
            letter-spacing: 0.5px;
            pointer-events: none;
            opacity: 0.9;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            animation: pulse 2s infinite;
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); opacity: 0.8; }
            50% { transform: translateX(-50%) scale(1.02); opacity: 0.95; }
            100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="presentation-container" id="presentationContainer">
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="slide-counter glass-panel" id="slideCounter">1 / 10</div>
        
        <button id="toggleInfoBtn" class="toggle-btn glass-panel">Show Info</button>

        <button id="fullscreenBtn" class="fullscreen-btn glass-panel">Go Fullscreen</button>

        <div class="slide-wrapper" id="slideWrapper"></div>
        
        <div class="nav-arrow prev-arrow glass-panel" id="prevBtn">&#10094;</div>
        <div class="nav-arrow next-arrow glass-panel" id="nextBtn">&#10095;</div>

        <div class="instruction-tag glass-panel" id="instructionTag" style="display: none;">
            <div style="color: #54a0ff; font-weight: 600;">presented by piuymal sithumina</div>
            <span id="timerDisplay" style="color: #000000; font-weight: 600; font-size: 11px; padding-left: 12px; border-left: 1px solid rgba(0,0,0,0.25); display: none;">00:00</span>
        </div>
    </div>

    <script>
        // Media links array
        const presentationMedia =[
            { type: "image", src: "https://i.ibb.co/FqcYcQcQ/Lawyer.png" },
            { type: "image", src: "https://i.ibb.co/ZR2Rx5SZ/Lawyer-2.png" },
            { type: "image", src: "https://i.ibb.co/NgpqkwXG/Lawyer-3.png" },
            { type: "image", src: "https://i.ibb.co/Q3GfMt3D/Lawyer-4.png" },
            { type: "image", src: "https://i.ibb.co/kgCwbxM6/Lawyer-5.png" }, 
            { type: "image", src: "https://i.ibb.co/ksgHsZjy/Lawyer-7.png" },
             { type: "video", src: "https://res.cloudinary.com/dugxlmpnu/video/upload/v1783273954/Ytdown.Com_Youtube_How-Brake-Systems-Work_Media_X5muoftpxac_001_1080P_jppwv7.mp4" },
            { type: "image", src: "https://i.ibb.co/JR5T08LY/Lawyer-6.png" }
         
        ];
        let currentIndex = 0;
        const slideWrapper = document.getElementById("slideWrapper");
        const container = document.getElementById("presentationContainer");
        const fullscreenBtn = document.getElementById("fullscreenBtn");
        const toggleInfoBtn = document.getElementById("toggleInfoBtn");
        const slideCounter = document.getElementById("slideCounter");
        const timerDisplay = document.getElementById("timerDisplay");
        const instructionTag = document.getElementById("instructionTag");
        const progressBar = document.getElementById("progressBar");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        
        let slideElements = [];
        let timerInterval = null;
        let startTime = 0;

        // 1. Initialize & Create Elements
        function initializePresentation() {
            slideWrapper.innerHTML = ""; // Clear existing
            slideElements = []; // Reset array safely
            
            presentationMedia.forEach((item, index) => {
                let element;
                
                if (item.type === "image") {
                    element = document.createElement("img");
                    element.src = item.src;
                } else if (item.type === "video") {
                    element = document.createElement("video");
                    element.src = item.src;
                    element.muted = false; 
                    element.playsInline = true; 
                    element.loop = false; 
                }
                
                element.classList.add("slide-media");
                
                // Set initial active state for the first item
                if (index === currentIndex) {
                    element.classList.add("active");
                }
                
                slideWrapper.appendChild(element);
                slideElements.push(element);
            });
            
            updateUIStatus();
            manageVideoPlayback();
        }

        // 2. Control Video Playback
        function manageVideoPlayback() {
            slideElements.forEach((element, index) => {
                if (element.tagName === "VIDEO") {
                    if (index === currentIndex) {
                        element.currentTime = 0; 
                        element.play().catch(error => console.log("Autoplay blocked:", error));
                    } else {
                        element.pause(); 
                    }
                }
            });
        }

        // 3. Update UI Elements (Counter and Progress Bar)
        function updateUIStatus() {
            const total = presentationMedia.length;
            slideCounter.innerText = `${currentIndex + 1} / ${total}`;
            const progressPercentage = ((currentIndex + 1) / total) * 100;
            progressBar.style.width = `${progressPercentage}%`;
        }

        // 4. Slide Navigation with Fade and Zoom Animation Trigger
        function updateSlidePosition() {
            slideElements.forEach((element, index) => {
                if (index === currentIndex) {
                    element.classList.add("active");
                } else {
                    element.classList.remove("active");
                }
            });
            manageVideoPlayback();
            updateUIStatus();
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % presentationMedia.length;
            updateSlidePosition();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + presentationMedia.length) % presentationMedia.length;
            updateSlidePosition();
        }

        // Timer Functions
        function startTimer() {
            if (!timerInterval) {
                startTime = Date.now();
                timerDisplay.style.display = "inline-block"; 
                timerInterval = setInterval(updateTimer, 1000);
            }
        }

        function updateTimer() {
            const elapsedTime = Date.now() - startTime;
            const totalSeconds = Math.floor(elapsedTime / 1000);
            const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const seconds = (totalSeconds % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `⏱️ ${minutes}:${seconds}`;
        }

        // Click Event Controls
        container.addEventListener("click", () => {
            nextSlide();
        });

        nextBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            nextSlide();
        });

        prevBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            prevSlide();
        });

        // Toggle Information Button Event
        toggleInfoBtn.addEventListener("click", (e) => {
            e.stopPropagation(); 
            if (instructionTag.style.display === "none" || instructionTag.style.display === "") {
                instructionTag.style.display = "flex";
                toggleInfoBtn.innerText = "Hide Info";
            } else {
                instructionTag.style.display = "none";
                toggleInfoBtn.innerText = "Show Info";
            }
        });

        // Fullscreen Controls
        fullscreenBtn.addEventListener("click", (e) => {
            e.stopPropagation(); 

            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    alert(`Error enabling fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener("fullscreenchange", () => {
            if (document.fullscreenElement) {
                fullscreenBtn.innerText = "Exit Fullscreen";
                startTimer(); 
            } else {
                fullscreenBtn.innerText = "Go Fullscreen";
            }
        });

        // Start presentation UI
        initializePresentation();
    </script>

</body>
</html>
